services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nlu
      POSTGRES_PASSWORD: nlu
      POSTGRES_DB: nlu_violations
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Schema is applied automatically on first container start via initdb hook
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nlu -d nlu_violations"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "5001:5000"
    environment:
      DATABASE_URL: postgresql://nlu:nlu@db:5432/nlu_violations
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount data directory so ingest can access CSVs without rebuilding the image
      - ./data:/app/data:ro

volumes:
  postgres_data:
